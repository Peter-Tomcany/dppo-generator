<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DPPO 2025 – Generátor XML E-Form | Helwitax</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg1: #0a1628; --bg2: #1a2744; --bg3: #0d2137;
  --card: rgba(255,255,255,0.04); --border: rgba(100,160,255,0.12);
  --accent: #4d9de0; --accent2: #6ba3d6; --text: #e0e8f0; --muted: #7da4c7;
  --input-bg: rgba(0,0,0,0.3); --input-border: rgba(100,160,255,0.2);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh; font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 50%, var(--bg3) 100%);
  color: var(--text);
}
.topbar {
  background: rgba(0,0,0,0.3); border-bottom: 1px solid var(--border);
  padding: 20px 28px; display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 12px;
}
.topbar-brand { font-size: 11px; letter-spacing: 3px; color: var(--accent2); text-transform: uppercase; margin-bottom: 4px; }
.topbar h1 { font-size: 22px; font-weight: 700; color: #fff; }
.topbar h1 span { color: var(--accent); font-weight: 400; }
.topbar-actions { display: flex; gap: 10px; flex-wrap: wrap; }
.tabs {
  display: flex; gap: 0; border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,0.15); padding: 0 28px; overflow-x: auto;
}
.tab-btn {
  background: none; border: none; cursor: pointer; padding: 12px 20px;
  font-size: 13px; font-weight: 400; color: var(--muted);
  border-bottom: 2px solid transparent; transition: all 0.15s; white-space: nowrap;
}
.tab-btn.active { font-weight: 700; color: #fff; border-bottom-color: var(--accent); }
.tab-btn:hover { color: #fff; }
.content { padding: 24px 28px; max-width: 1020px; margin: 0 auto; }
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 24px; margin-bottom: 16px;
}
.section-title { font-size: 15px; font-weight: 700; color: var(--accent); letter-spacing: 0.3px; margin: 0 0 16px; }
.section-divider {
  grid-column: 1 / -1; padding: 10px 0 4px; font-size: 12px; font-weight: 700;
  color: var(--accent); border-top: 1px solid rgba(100,160,255,0.1); margin-top: 8px; letter-spacing: 0.5px;
}
.upload-area {
  border: 2px dashed rgba(100,160,255,0.25); border-radius: 16px; padding: 60px 20px;
  text-align: center; background: rgba(255,255,255,0.02); transition: all 0.2s; margin-top: 60px;
}
.upload-area.drag { border-color: var(--accent); background: rgba(77,157,224,0.08); }
.upload-area .icon { font-size: 48px; margin-bottom: 16px; }
.upload-area h2 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
.upload-area p { color: var(--muted); margin-bottom: 20px; font-size: 14px; }
.btn {
  border: none; border-radius: 8px; padding: 8px 18px; font-size: 13px;
  font-weight: 600; cursor: pointer; color: #fff; transition: filter 0.15s;
}
.btn:hover { filter: brightness(1.15); }
.btn-blue { background: #2563eb; }
.btn-green { background: #059669; }
.btn-gray { background: #6b7280; }
.btn-sm { padding: 4px 12px; font-size: 12px; }
label.btn { display: inline-block; }
label.btn input[type="file"] { display: none; }
.grid-table { display: grid; grid-template-columns: 80px 1fr 150px; gap: 0; }
.th { padding: 8px; font-size: 11px; font-weight: 700; color: var(--accent2); text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid rgba(100,160,255,0.15); }
.th-right { text-align: right; }
.td { padding: 6px 8px; font-size: 13px; border-bottom: 1px solid rgba(100,160,255,0.05); }
.td-num { padding: 3px 0; text-align: right; border-bottom: 1px solid rgba(100,160,255,0.05); }
.td-muted { color: var(--muted); }
.td-bold { font-weight: 700; }
.td-bold-w { font-weight: 600; }
input.num-input {
  width: 100%; text-align: right; background: rgba(0,0,0,0.2);
  border: 1px solid rgba(100,160,255,0.1); border-radius: 4px; color: #c8dae8;
  padding: 5px 8px; font-size: 13px; font-family: 'Consolas', 'Monaco', monospace;
}
input.num-input.bold { color: #fff; font-weight: 700; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.field input[type="text"], .field input[type="number"] {
  width: 100%; background: var(--input-bg); border: 1px solid var(--input-border);
  border-radius: 6px; color: var(--text); padding: 8px 10px; font-size: 14px; font-family: inherit;
}
.field.full { grid-column: 1 / -1; }
.check-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.check-label {
  display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 6px 0; font-size: 13px;
}
.check-label input { accent-color: var(--accent); width: 16px; height: 16px; }
textarea.oz-area {
  width: 100%; background: var(--input-bg); border: 1px solid var(--input-border);
  border-radius: 8px; color: var(--text); padding: 10px 12px; font-size: 13px;
  font-family: inherit; resize: vertical;
}
.xml-pre {
  background: rgba(0,0,0,0.4); border-radius: 8px; padding: 16px; font-size: 11px;
  line-height: 1.5; overflow-x: auto; max-height: 600px; color: #a8d4f0;
  border: 1px solid rgba(100,160,255,0.1); white-space: pre-wrap; word-break: break-all;
  font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
}
.info-bar {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap; padding: 14px 20px;
}
.info-bar .label { color: var(--accent2); font-size: 13px; }
.info-bar .value { font-weight: 600; }
.info-bar .count { color: var(--muted); font-size: 13px; }
@media (max-width: 700px) {
  .form-grid, .check-grid { grid-template-columns: 1fr; }
  .grid-table { grid-template-columns: 60px 1fr 110px; }
  .content { padding: 16px; }
  .topbar { padding: 16px; }
}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-brand">Helwitax · Generátor XML E-Form</div>
    <h1>Daňové priznanie PO <span>2025</span></h1>
  </div>
  <div class="topbar-actions" id="topActions" style="display:none">
    <button class="btn btn-blue" onclick="doGenerate()">Generovať XML</button>
    <button class="btn btn-green" onclick="doDownload()">⬇ Stiahnuť XML</button>
  </div>
</div>

<div class="tabs" id="tabBar" style="display:none">
  <button class="tab-btn active" data-tab="data">Dáta z Excelu</button>
  <button class="tab-btn" data-tab="header">Hlavička DP</button>
  <button class="tab-btn" data-tab="osoba">Oprávnená osoba</button>
  <button class="tab-btn" data-tab="xml">XML náhľad</button>
</div>

<div class="content">
  <div id="uploadArea" class="upload-area"
    ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
    <div class="icon">📊</div>
    <h2>Pretiahnite Excel súbor sem</h2>
    <p>Výpočet_ZD_2025.xlsm alebo podobný súbor s hárkom „Pomôcka k DP"</p>
    <label class="btn btn-blue">Vybrať súbor
      <input type="file" accept=".xlsx,.xlsm,.xls" onchange="handleFileInput(event)">
    </label>
  </div>
  <div id="tab-data" class="tab-content" style="display:none"></div>
  <div id="tab-header" class="tab-content" style="display:none"></div>
  <div id="tab-osoba" class="tab-content" style="display:none"></div>
  <div id="tab-xml" class="tab-content" style="display:none"></div>
</div>

<script>
// =====================================================================
// CONSTANTS
// =====================================================================
const ROW_MAP = [

  [230,"r230"],[240,"r240"],[250,"r250"],[260,"r260"],[270,"r270"],
  [280,"r280"],[290,"r290"],[300,"r300"],[301,"r301"],[302,"r302"],
  [303,"r303"],[304,"r304"],[305,"r305"],[306,"r306"],[307,"r307"],
  [308,"r308"],[310,"r310"],[320,"r320"],[330,"r330"],[400,"r400"],
  [410,"r410"],[500,"r500"],[501,"r501"],[502,"r502"],[503,"r503"],
  [510,"r510"],[550,"r550"],[560,"r560"],[600,"r600"],
  [700,"r700"],[710,"r710"],[800,"r800"],[810,"r810"],
  [820,"r820"],[830,"r830"],[840,"r840"],[900,"r900"],
  [910,"r910"],[920,"r920"],[1000,"r1000"],[1010,"r1010"],
  [1020,"r1020"],[1030,"r1030"],[1040,"r1040"],[1050,"r1050"],
  [1060,"r1060"],[1061,"r1061"],[1062,"r1062"],[1070,"r1070"],
  [1071,"r1071"],[1080,"r1080"],[1090,"r1090"],[1100,"r1100"],
  [1101,"r1101"],[1110,"r1110"],

const ROW_LABELS = {
  100:"VH pred zdanením",110:"Transferové oceňovanie §17(5)",
  130:"Nedaňové výdavky §21, §17k, §21a (tab. A)",140:"Nezaplatené výdavky §17(19)",
  150:"Odpisy – účtovné > daňové (tab. B)",170:"Likvidácia, konkurz, vklady §17(8)",
  180:"Ostatné sumy zvyšujúce VH",200:"Súčet r.100 až r.180",
  210:"Príjmy nie sú predmetom dane §12(7)",220:"Príjmy zdanené zrážkou §43",

  250:"Odpisy – daňové > účtovné (tab. B)",260:"Oslobodenie §13c (predaj akcií/podielov)",
  270:"Zaplatené výdavky §17(19)",280:"Zníženie ZD – likvidácia, vklady",
  290:"Ostatné sumy znižujúce VH",300:"Súčet r.210 až r.290",
  301:"Základ dane / daňová strata",302:"Osobné auto ≥48 000 EUR §17(34)",
  303:"Členské príspevky §19(3)(n)",304:"Víno – reklamný predmet §21(1)(h)",
  305:"Sponzorské §17(19)(h)",306:"Zvýšenie ZD – motorové vozidlo §17(39)",
  307:"Zníženie ZD – praktické vyučovanie §17(37)",308:"CFC – kontrolované zahraničné spoločnosti §17h",
  310:"Upravený ZD / daňová strata",320:"Časť ZD v.o.s. / k.s.",
  330:"Vyňatie príjmov zo zahraničia",400:"ZD / daňová strata pred odpočtom straty",
  410:"Odpočet daňovej straty (tab. D)",500:"ZD po odpočte straty",
  501:"Odpočet R&D §30c",502:"Odpočet investície §30e",503:"Odpočet šport §30ca",
  510:"ZD po odpočtoch",550:"Sadzba dane",560:"Úhrn zdaniteľných príjmov",
  600:"Daň",610:"Úľava na dani",700:"Daň znížená o úľavu",
  710:"Zápočet dane zo zahraničia (tab. E)",800:"Daň po úľavách a zápočte",
  810:"Minimálna daň §46b",820:"Minimálna daň na úhradu",
  830:"Kladný rozdiel min. daň – daň",840:"Min. daň – zmena ZO",
  900:"Daň / minimálna daň",910:"Rozdiel daň – min. daň pre zápočet",
  920:"Zápočet min. dane (tab. K)",1000:"Daň po zápočte min. dane",
  1010:"Zaplatené preddavky §42",1020:"Preddavky z min. obdobia",
  1030:"Daň zrazená §43(6,7)",1040:"Celkové preddavky",
  1050:"Daň / min. daň pred úpravou",1060:"Daň §17f",
  1061:"Daň §17f – EÚ/EHP",1062:"Daň §17f – mimo EÚ",
  1070:"Daň §51e (dividendy)",1071:"Daň §51ea (štátne dlhopisy)",
  1080:"Celková daň",1090:"Daň §17f v splátkach",
  1100:"Daň na úhradu (+)",1101:"Daňový preplatok (–)",1110:"Daň pre preddavky §42(6)",
};

const SECTION_HEADERS = {
  100:"II. časť – Výpočet základu dane a dane",
  301:"Základ dane / daňová strata",
  310:"Výpočet dane",
  810:"Minimálna daň",
  1010:"Preddavky a splatná daň",
};

const BOLD_ROWS = new Set([200,300,301,310,400,500,510,600,700,800,900,1050,1080,1100,1101]);

const TAB_B_LABELS = {
  'B1':'Účtovné odpisy dlhodobého hmotného majetku',
  'B2':'Daňové odpisy hmotného majetku',
  'B3':'Neuplatnená časť ročného odpisu prenajatého majetku',
  'B4':'Prerušenie uplatňovania daňových odpisov',
  'B5':'Pomerná časť ročného odpisu pri predaji hmotného majetku',
  'B6':'Odpisy hmotného majetku zahrnuté do základu dane',
};

// =====================================================================
// EXCEL PARSER
// =====================================================================
function parseExcelFile(arrayBuffer) {
  const wb = XLSX.read(arrayBuffer, {type:'array'});
  const result = {header:{}, rows:{}, tabARows:{}, tabBRows:{}};

  // --- Základné údaje ---
  if (wb.SheetNames.indexOf('Základné údaje') >= 0) {
    const ws = wb.Sheets['Základné údaje'];
    const cv = (c) => ws[c] ? ws[c].v : '';
    result.header.obchodneMeno = cv('C3');
    result.header.sidloUlica = cv('C4');
    result.header.sidloCislo = cv('C5');
    result.header.sidloPsc = String(cv('C6')).replace(/\s/g,'');
    result.header.sidloObec = cv('C7');
    result.header.sidloStat = cv('C8') || 'Slovensko';
    result.header.ico = String(cv('C9'));
    result.header.dic = String(cv('C10'));
    const pf = String(cv('C11'));
    const pfm = pf.match(/^(\d{3})/);
    if (pfm) result.header.pravnaForma = pfm[1];
    const nace = String(cv('C12')).replace(/\./g,'');
    if (nace.length >= 4) {
      result.header.skNaceK1 = nace.substring(0,2);
      result.header.skNaceK2 = nace.substring(2,4);
      result.header.skNaceK3 = nace.length >= 5 ? nace.substring(4,5) : '0';
    }
    const naceCinnost = cv('C12a');
    result.header.skNaceCinnost = naceCinnost || '';
    const dOd = cv('C13'), dDo = cv('C14');
    if (dOd) result.header.zdanObdOd = fmtDate(dOd);
    if (dDo) result.header.zdanObdDo = fmtDate(dDo);
    const mikro = String(cv('C15')).toUpperCase();
    result.header.mikrodanovnik = (mikro==='ÁNO'||mikro==='ANO') ? 1 : 0;

    // Checkboxes from header
    result.header.uplatnujemPar17 = (String(cv('C16')).toUpperCase()==='ÁNO'||String(cv('C16')).toUpperCase()==='ANO') ? 1 : 0;
    result.header.ukoncujemPar17 = (String(cv('C17')).toUpperCase()==='ÁNO'||String(cv('C17')).toUpperCase()==='ANO') ? 1 : 0;
    result.header.obmedzenie = (String(cv('C18')).toUpperCase()==='ÁNO'||String(cv('C18')).toUpperCase()==='ANO') ? 1 : 0;
    result.header.prepojenie = (String(cv('C18b')).toUpperCase()==='ÁNO'||String(cv('C18b')).toUpperCase()==='ANO') ? 1 : 0;
    result.header.oslobodenie13ab = (String(cv('C18c')).toUpperCase()==='ÁNO'||String(cv('C18c')).toUpperCase()==='ANO') ? 1 : 0;
    result.header.polovicna46b3 = (String(cv('C18d')).toUpperCase()==='ÁNO'||String(cv('C18d')).toUpperCase()==='ANO') ? 1 : 0;
    result.header.neplatenie46b7 = (String(cv('C18e')).toUpperCase()==='ÁNO'||String(cv('C18e')).toUpperCase()==='ANO') ? 1 : 0;
    result.header.zapocitanie46b5 = (String(cv('C18f')).toUpperCase()==='ÁNO'||String(cv('C18f')).toUpperCase()==='ANO') ? 1 : 0;

    // Stála prevádzka
    result.header.spUlica = cv('C20') || '';
    result.header.spCislo = cv('C21') || '';
    result.header.spPsc = String(cv('C22')).replace(/\s/g,'') || '';
    result.header.spObec = cv('C23') || '';
    result.header.spPocet = cv('C24') || '';

    // Osobitné záznamy
    result.header.osobitneZaznamy = cv('C26') || '';

    // Oprávnená osoba
    result.header.priezvisko = cv('C28') || '';
    result.header.meno = cv('C29') || '';
    result.header.titul = cv('C30') || '';
    result.header.titulZa = cv('C31') || '';
    result.header.postavenie = cv('C32') || '';

    // Telefón a email
    result.header.sidloTel = cv('C33') || '';
    result.header.sidloEmail = cv('C34') || '';

    // Počet príloh
    result.header.pocetPriloh = cv('C35') || '';
    result.header.datumVyhlasenia = fmtDate(cv('C36')) || '';

    const zdanPrijmy = cv('C19');
    if (zdanPrijmy && typeof zdanPrijmy === 'number') result.rows[560] = zdanPrijmy;
  }

  // --- Pomôcka k DP ---
  if (wb.SheetNames.indexOf('Pomôcka k DP') >= 0) {
    const ws = wb.Sheets['Pomôcka k DP'];
    const range = XLSX.utils.decode_range(ws['!ref']||'A1:E100');
    for (let R = range.s.r; R <= range.e.r; R++) {
      const cC = ws[XLSX.utils.encode_cell({r:R,c:2})];
      const cD = ws[XLSX.utils.encode_cell({r:R,c:3})];
      const cE = ws[XLSX.utils.encode_cell({r:R,c:4})];
      const valE = cE ? cE.v : null;
      if (cC && typeof cC.v === 'number') {
        const rn = cC.v;
        if (ROW_MAP.some(x => x[0]===rn) || rn===610) result.rows[rn] = valE;
      }
      if (cD && typeof cD.v === 'string' && cD.v.startsWith('130/A')) {
        result.tabARows[cD.v] = valE;
      }
    }
  }

  // --- Pomocné výpočty → Tabuľka B ---
  if (wb.SheetNames.indexOf('Pomocné výpočty') >= 0) {
    const ws = wb.Sheets['Pomocné výpočty'];
    for (let R = 9; R <= 15; R++) {
      const cB = ws[XLSX.utils.encode_cell({r:R,c:1})];
      const cH = ws[XLSX.utils.encode_cell({r:R,c:7})];
      if (cB && typeof cB.v === 'string' && cB.v.match(/^B\d$/)) {
        result.tabBRows[cB.v] = cH ? cH.v : null;
      }
    }
  }

  return result;
}

function fmtDate(v) {
  if (!v) return '';
  if (v instanceof Date) {
    const d = String(v.getDate()).padStart(2,'0');
    const m = String(v.getMonth()+1).padStart(2,'0');
    return d+'.'+m+'.'+v.getFullYear();
  }
  return String(v);
}

// =====================================================================
// XML GENERATOR – DOKUMENT FORMAT (matching reference XML)
// =====================================================================
function fmtDec(v) {
  if (v===null||v===undefined||v===''||v===0) return '';
  const n = typeof v==='number' ? v : parseFloat(String(v).replace(',','.'));
  if (isNaN(n)) return '';
  // Special case: r900 should be "0.00" not empty
  if (n === 0) return '0.00';
  return n.toFixed(2);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function xmlEl(tag,val) { return '<'+tag+'>'+esc(val)+'</'+tag+'>'; }
function xmlDec(tag,val) { return '<'+tag+'>'+esc(fmtDec(val))+'</'+tag+'>'; }

function generateXml(header, rows, tabARows, tabBRows) {
  const h = header || {};
  const rv = (n) => rows[n] ?? '';
  const pad2 = (i) => String(i).padStart(2,'0');
  tabARows = tabARows || {};
  tabBRows = tabBRows || {};

  // XML declaration with lowercase utf-8
  let xml = '<?xml version="1.0" encoding="utf-8"?>\n';
  xml += '<dokument>\n';

  // =====================================================================
  // HLAVICKA SECTION
  // =====================================================================
  xml += '\t<hlavicka>\n';
  xml += '\t\t'+xmlEl('dic', h.dic || '') + '\n';
  xml += '\t\t'+xmlEl('ico', h.ico || '') + '\n';
  xml += '\t\t'+xmlEl('pravnaForma', h.pravnaForma || '') + '\n';

  xml += '\t\t<typDP>\n';
  xml += '\t\t\t<rdp>1</rdp>\n';
  xml += '\t\t\t<odp>0</odp>\n';
  xml += '\t\t\t<ddp>0</ddp>\n';
  xml += '\t\t</typDP>\n';

  xml += '\t\t<zdanovacieObdobie>\n';
  xml += '\t\t\t'+xmlEl('od', h.zdanObdOd || '') + '\n';
  xml += '\t\t\t'+xmlEl('do', h.zdanObdDo || '') + '\n';
  xml += '\t\t</zdanovacieObdobie>\n';

  xml += '\t\t<skNace>\n';
  xml += '\t\t\t<k1>'+esc(h.skNaceK1 || '')+'</k1>\n';
  xml += '\t\t\t<k2>'+esc(h.skNaceK2 || '')+'</k2>\n';
  xml += '\t\t\t<k3>'+esc(h.skNaceK3 || '0')+'</k3>\n';
  xml += '\t\t\t<cinnost>'+esc(h.skNaceCinnost || '')+'</cinnost>\n';
  xml += '\t\t</skNace>\n';

  xml += '\t\t<obchodneMeno>\n';

let currentData = null;
let generatedXml = '';

function handleDragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag');
}

function handleDragLeave(e) {
  e.currentTarget.classList.remove('drag');
}

function handleDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag');
  const files = e.dataTransfer.files;
  if (files.length) processFile(files[0]);
}

function handleFileInput(e) {
  if (e.target.files.length) processFile(e.target.files[0]);
}

function processFile(file) {
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const parsed = parseExcelFile(ev.target.result);
      currentData = parsed;
      showTabs();
      renderDataTab();
    } catch(err) {
      alert('Chyba pri načítaní súboru: '+err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function showTabs() {
  document.getElementById('uploadArea').style.display = 'none';
  document.getElementById('tabBar').style.display = 'flex';
  document.getElementById('topActions').style.display = 'flex';

  const tabs = document.querySelectorAll('.tab-btn');
  tabs.forEach(t => {
    t.addEventListener('click', (e) => switchTab(e.target.dataset.tab));
  });

  switchTab('data');
}

function switchTab(tabName) {
  const allTabs = document.querySelectorAll('.tab-content');
  allTabs.forEach(t => t.style.display = 'none');

  const btns = document.querySelectorAll('.tab-btn');
  btns.forEach(b => b.classList.remove('active'));

  document.getElementById('tab-'+tabName).style.display = 'block';
  document.querySelector('[data-tab="'+tabName+'"]').classList.add('active');

  if (tabName === 'header') renderHeaderTab();
  else if (tabName === 'osoba') renderOsobaTab();
  else if (tabName === 'xml') renderXmlTab();
}

function renderDataTab() {
  const d = currentData;
  let html = '<div class="card"><h3 class="section-title">Dáta z Excel súboru</h3>';
  html += '<div class="grid-table">';
  html += '<div class="th">Riadok</div><div class="th">Popis</div><div class="th th-right">Hodnota</div>';

  for (const [rNum, xmlName] of ROW_MAP) {
    const val = d.rows[rNum] ?? '';
    const label = ROW_LABELS[rNum] || '';
    if (val !== '') {
      html += '<div class="td">'+rNum+'</div>';
      html += '<div class="td">'+label+'</div>';
      html += '<div class="td-num">'+esc(fmtDec(val))+'</div>';
    }
  }

  html += '</div></div>';
  document.getElementById('tab-data').innerHTML = html;
}

function renderHeaderTab() {
  const h = currentData.header || {};
  let html = '<div class="card"><h3 class="section-title">Hlavička Daňového priznania</h3>';
  html += '<div class="form-grid">';
  html += '<div class="field"><label>DIC</label><input type="text" value="'+esc(h.dic||'')+'" readonly></div>';
  html += '<div class="field"><label>IČO</label><input type="text" value="'+esc(h.ico||'')+'" readonly></div>';
  html += '<div class="field"><label>Obchodné meno</label><input type="text" value="'+esc(h.obchodneMeno||'')+'" readonly></div>';
  html += '<div class="field"><label>Sídlo - Ulica</label><input type="text" value="'+esc(h.sidloUlica||'')+'" readonly></div>';
  html += '<div class="field"><label>Číslo</label><input type="text" value="'+esc(h.sidloCislo||'')+'" readonly></div>';
  html += '<div class="field"><label>PSČ</label><input type="text" value="'+esc(h.sidloPsc||'')+'" readonly></div>';
  html += '<div class="field"><label>Obec</label><input type="text" value="'+esc(h.sidloObec||'')+'" readonly></div>';
  html += '<div class="field"><label>Štát</label><input type="text" value="'+esc(h.sidloStat||'')+'" readonly></div>';
  html += '<div class="field"><label>Telefón</label><input type="text" value="'+esc(h.sidloTel||'')+'" readonly></div>';
  html += '<div class="field"><label>Email/Fax</label><input type="text" value="'+esc(h.sidloEmail||'')+'" readonly></div>';
  html += '</div></div>';
  document.getElementById('tab-header').innerHTML = html;
}

function renderOsobaTab() {
  const h = currentData.header || {};
  let html = '<div class="card"><h3 class="section-title">Oprávnená osoba</h3>';
  html += '<div class="form-grid">';
  html += '<div class="field"><label>Priezvisko</label><input type="text" value="'+esc(h.priezvisko||'')+'" readonly></div>';
  html += '<div class="field"><label>Meno</label><input type="text" value="'+esc(h.meno||'')+'" readonly></div>';
  html += '<div class="field"><label>Titul</label><input type="text" value="'+esc(h.titul||'')+'" readonly></div>';
  html += '<div class="field"><label>Titul za</label><input type="text" value="'+esc(h.titulZa||'')+'" readonly></div>';
  html += '<div class="field"><label>Postavenie</label><input type="text" value="'+esc(h.postavenie||'')+'" readonly></div>';
  html += '<div class="field full"><label>Osobitné záznamy</label><textarea class="oz-area" readonly>'+esc(h.osobitneZaznamy||'')+'</textarea></div>';
  html += '</div></div>';
  document.getElementById('tab-osoba').innerHTML = html;
}

function renderXmlTab() {
  let html = '<div class="card">';
  if (generatedXml) {
    html += '<div class="info-bar"><div class="label">XML náhľad:</div></div>';
    html += '<div class="xml-pre">'+esc(generatedXml)+'</div>';
  } else {
    html += '<p style="color:var(--muted)">Zatiaľ nebola vygenerovaná XML.</p>';
  }
  html += '</div>';
  document.getElementById('tab-xml').innerHTML = html;
}

function doGenerate() {
  if (!currentData) {
    alert('Najprvprette súbor!');
    return;
  }
  generatedXml = generateXml(currentData.header, currentData.rows, currentData.tabARows, currentData.tabBRows);
  renderXmlTab();
  switchTab('xml');
}

function doDownload() {
  if (!generatedXml) {
    alert('Najprv vygenerujte XML!');
    return;
  }
  const blob = new Blob([generatedXml], {type:'text/xml'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'DPPO_2025.xml';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
